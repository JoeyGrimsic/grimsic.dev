<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartInsight — AI File Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --surface: #17171a; --border: #2a2a30;
      --accent: #7c6af7; --accent-dim: rgba(124,106,247,0.15);
      --text: #e8e8f0; --muted: #7a7a8a;
      --success: #4ade80; --error: #f87171; --radius: 12px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter','Segoe UI',system-ui,sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    header { text-align: center; margin-bottom: 2.5rem; width: 100%; max-width: 680px; position: relative; }
    .back-link { position: absolute; left: 0; top: 0; color: var(--muted); text-decoration: none; font-size: .85rem; transition: color .2s; }
    .back-link:hover { color: var(--text); }
    h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -.5px; background: linear-gradient(135deg,#a78bfa,#818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: .5rem; }
    .subtitle { color: var(--muted); font-size: 1rem; }
    main { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 1.5rem; }
    .upload-zone { border: 2px dashed var(--border); border-radius: var(--radius); background: var(--surface); padding: 3rem 2rem; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; outline: none; }
    .upload-zone:hover, .upload-zone:focus, .upload-zone.drag-over { border-color: var(--accent); background: var(--accent-dim); }
    .upload-icon { width: 52px; height: 52px; margin: 0 auto 1rem; color: var(--accent); }
    .upload-icon svg { width: 100%; height: 100%; }
    .upload-label { font-size: 1rem; color: var(--text); margin-bottom: .4rem; }
    .upload-label .link { color: var(--accent); text-decoration: underline; }
    .upload-hint { font-size: .8rem; color: var(--muted); }
    .status-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; }
    .status-header { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; }
    .progress-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg,#7c6af7,#818cf8); width: 0%; transition: width .4s ease; border-radius: 2px; }
    .result-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
    .result-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: .5rem; }
    .result-filename { font-weight: 600; font-size: .95rem; }
    .result-model { font-size: .75rem; color: var(--muted); background: var(--border); padding: 2px 8px; border-radius: 99px; }
    .result-text { color: var(--text); font-size: .95rem; line-height: 1.7; white-space: pre-wrap; margin-bottom: 1.25rem; }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: .5rem 1.1rem; border-radius: 8px; cursor: pointer; font-size: .875rem; transition: border-color .2s, color .2s; }
    .btn-secondary:hover { border-color: var(--accent); color: var(--text); }
    .hidden { display: none !important; }
    footer { margin-top: 3rem; font-size: .75rem; color: var(--muted); text-align: center; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="back-link">← grimsic.dev</a>
    <h1>SmartInsight</h1>
    <p class="subtitle">Upload an image or document. Get AI-powered analysis instantly.</p>
  </header>

  <main>
    <div id="upload-zone" class="upload-zone" role="button" tabindex="0">
      <input type="file" id="file-input" accept="image/*,.pdf,.txt" hidden />
      <div class="upload-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
          <polyline points="16 12 12 8 8 12"/><line x1="12" y1="8" x2="12" y2="20"/>
        </svg>
      </div>
      <p class="upload-label">Drop a file here or <span class="link">browse</span></p>
      <p class="upload-hint">Images (JPG, PNG, GIF, WebP) · PDF · TXT · Max 20 MB</p>
    </div>

    <div id="status-box" class="status-box hidden">
      <div class="status-header">
        <span id="status-icon"></span>
        <span id="status-text">Uploading…</span>
      </div>
      <div class="progress-bar-wrap"><div id="progress-bar" class="progress-bar"></div></div>
    </div>

    <section id="result-section" class="result-section hidden">
      <div class="result-meta">
        <span id="result-filename" class="result-filename"></span>
        <span id="result-model" class="result-model"></span>
      </div>
      <div id="result-text" class="result-text"></div>
      <button id="analyze-another" class="btn-secondary">Analyze another file</button>
    </section>
  </main>

  <footer>Powered by Vertex AI (Gemini) · Cloud Run · Cloud Functions · Firestore</footer>

  <script>
    const API = "https://smartinsight-982961624122.us-central1.run.app";

    const zone = document.getElementById("upload-zone");
    const fileInput = document.getElementById("file-input");
    const statusBox = document.getElementById("status-box");
    const statusText = document.getElementById("status-text");
    const statusIcon = document.getElementById("status-icon");
    const progressBar = document.getElementById("progress-bar");
    const resultSection = document.getElementById("result-section");
    const resultFilename = document.getElementById("result-filename");
    const resultModel = document.getElementById("result-model");
    const resultText = document.getElementById("result-text");

    zone.addEventListener("click", () => fileInput.click());
    zone.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") fileInput.click(); });
    fileInput.addEventListener("change", () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });
    zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("drag-over"); });
    zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
    zone.addEventListener("drop", e => { e.preventDefault(); zone.classList.remove("drag-over"); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
    document.getElementById("analyze-another").addEventListener("click", reset);

    function reset() {
      fileInput.value = "";
      statusBox.classList.add("hidden");
      resultSection.classList.add("hidden");
      zone.classList.remove("hidden");
      progressBar.style.width = "0%";
    }

    function setStatus(icon, text, progress) {
      statusIcon.textContent = icon;
      statusText.textContent = text;
      if (progress !== undefined) progressBar.style.width = progress + "%";
    }

    async function handleFile(file) {
      zone.classList.add("hidden");
      statusBox.classList.remove("hidden");
      resultSection.classList.add("hidden");
      setStatus("⏳", "Requesting upload URL…", 10);
      try {
        const res = await fetch(`${API}/upload-url`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ filename: file.name, content_type: file.type }),
        });
        if (!res.ok) { const e = await res.json(); throw new Error(e.error || "Failed to get upload URL"); }
        const { upload_url, file_id } = await res.json();

        setStatus("⬆️", "Uploading to Cloud Storage…", 35);
        await uploadToGCS(upload_url, file);

        setStatus("🧠", "Analyzing with Vertex AI…", 65);
        const analysis = await pollResults(file_id);

        setStatus("✅", "Analysis complete", 100);
        setTimeout(() => showResult(file.name, analysis), 300);
      } catch (err) {
        setStatus("❌", err.message || "Something went wrong", 0);
      }
    }

    function uploadToGCS(url, file) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("PUT", url);
        xhr.setRequestHeader("Content-Type", file.type);
        xhr.onload = () => xhr.status < 300 ? resolve() : reject(new Error(`GCS upload failed: ${xhr.status}`));
        xhr.onerror = () => reject(new Error("Network error during upload"));
        xhr.send(file);
      });
    }

    async function pollResults(fileId, attempts = 30, interval = 3000) {
      for (let i = 0; i < attempts; i++) {
        await new Promise(r => setTimeout(r, interval));
        const res = await fetch(`${API}/results/${fileId}`);
        if (!res.ok) throw new Error("Failed to fetch results");
        const data = await res.json();
        if (data.status === "complete") return data;
        if (data.status === "error") throw new Error(data.error || "Analysis failed");
      }
      throw new Error("Analysis timed out");
    }

    function showResult(filename, data) {
      statusBox.classList.add("hidden");
      resultFilename.textContent = filename;
      resultModel.textContent = data.model || "Gemini";
      resultText.textContent = data.analysis;
      resultSection.classList.remove("hidden");
    }
  </script>
</body>
</html>
